name: Quick CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quick-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-ci:
    name: Compile and verify self-improvement
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy

      - name: Compile runtime and helpers
        run: |
          python -m py_compile rsi_metaforge_core.py
          python -m py_compile repo_rsi.py verify_rsi.py test_repo_rsi.py

      - name: Check CLI surface
        run: python rsi_metaforge_core.py --help

      - name: Run dynamic-evaluator guard
        run: python rsi_metaforge_core.py --mode test --only test_trusted_core_dynamic_execution_boundary

      - name: Repository patch-agent anti-cheat tests
        run: python rsi_metaforge_core.py --mode repo-rsi-test

      - name: Verify recursive self-improvement (all three gates)
        run: python verify_rsi.py
