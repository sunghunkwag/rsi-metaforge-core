name: Full Evidence

on:
  push:
    branches:
      - main
    paths:
      - "rsi_levels_metaforge_unified.py"
      - "README.md"
      - "EVIDENCE.md"
      - ".github/workflows/full-evidence.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-evidence-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-evidence:
    name: Full evidence battery
    runs-on: ubuntu-latest
    # The full battery (sc-battery runs ~82 min and is executed twice for the
    # byte-identity check, plus forge/horizon and the ascent K-P batteries)
    # takes ~3.8 h of wall clock; 180 min cancelled every run mid sc-battery.
    # Raised to 330 min (well under GitHub's 360 min hosted-runner ceiling) so
    # a run can complete. No battery, digest, or assertion is weakened.
    timeout-minutes: 330

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare evidence directory
        run: mkdir -p reports/evidence

      - name: Compile runtime
        run: python -m py_compile "rsi_levels_metaforge_unified.py"

      - name: Run file-world evidence battery
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode file-battery 2>&1 | tee reports/evidence/file_battery.log

      - name: Run self-forge evidence battery
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode forge-battery 2>&1 | tee reports/evidence/forge_battery.log

      - name: Run horizon scan certificate
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode horizon-scan 2>&1 | tee reports/evidence/horizon_scan.log

      - name: Run continuous functional substrate battery
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode cfs-battery 2>&1 | tee reports/evidence/cfs_battery.log

      - name: Run expansion battery
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode expansion-battery 2>&1 | tee reports/evidence/expansion_battery.log

      - name: Run grammar battery
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode grammar-battery 2>&1 | tee reports/evidence/grammar_battery.log

      - name: Run grammar2 battery
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode grammar2-battery 2>&1 | tee reports/evidence/grammar2_battery.log

      - name: Run self-curriculum battery twice and assert digest equality
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode sc-battery 2>&1 | tee reports/evidence/sc_battery_run1.log
          cp reports/evidence/sc_battery_results.json reports/evidence/sc_battery_results_run1.json
          cp reports/evidence/sc_ledger.jsonl reports/evidence/sc_ledger_run1.jsonl
          python -u "rsi_levels_metaforge_unified.py" --mode sc-battery 2>&1 | tee reports/evidence/sc_battery_run2.log
          d1=$(grep -o '"sc_digest": "[0-9a-f]*"' reports/evidence/sc_battery_run1.log | head -1)
          d2=$(grep -o '"sc_digest": "[0-9a-f]*"' reports/evidence/sc_battery_run2.log | head -1)
          echo "run1 ${d1}"
          echo "run2 ${d2}"
          test -n "${d1}"
          [ "${d1}" = "${d2}" ]
          cmp reports/evidence/sc_battery_results_run1.json reports/evidence/sc_battery_results.json
          cmp reports/evidence/sc_ledger_run1.jsonl reports/evidence/sc_ledger.jsonl

      - name: Run fence-expansion battery twice and assert digest equality
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode sc2-battery 2>&1 | tee reports/evidence/sc2_battery_run1.log
          cp reports/evidence/sc2_battery_results.json reports/evidence/sc2_battery_results_run1.json
          cp reports/evidence/sc2_ledger.jsonl reports/evidence/sc2_ledger_run1.jsonl
          python -u "rsi_levels_metaforge_unified.py" --mode sc2-battery 2>&1 | tee reports/evidence/sc2_battery_run2.log
          d1=$(grep -o '"sc2_digest": "[0-9a-f]*"' reports/evidence/sc2_battery_run1.log | head -1)
          d2=$(grep -o '"sc2_digest": "[0-9a-f]*"' reports/evidence/sc2_battery_run2.log | head -1)
          echo "run1 ${d1}"
          echo "run2 ${d2}"
          test -n "${d1}"
          [ "${d1}" = "${d2}" ]
          cmp reports/evidence/sc2_battery_results_run1.json reports/evidence/sc2_battery_results.json
          cmp reports/evidence/sc2_ledger_run1.jsonl reports/evidence/sc2_ledger.jsonl

      - name: Run ascent phase K battery twice and assert digest equality
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode ascent-k-battery 2>&1 | tee reports/evidence/ascent_k_run1.log
          cp reports/evidence/ascent_k_results.json reports/evidence/ascent_k_results_run1.json
          cp reports/evidence/ascent_k_ledger.jsonl reports/evidence/ascent_k_ledger_run1.jsonl
          python -u "rsi_levels_metaforge_unified.py" --mode ascent-k-battery 2>&1 | tee reports/evidence/ascent_k_run2.log
          d1=$(grep -o '"ak_digest": "[0-9a-f]*"' reports/evidence/ascent_k_run1.log | head -1)
          d2=$(grep -o '"ak_digest": "[0-9a-f]*"' reports/evidence/ascent_k_run2.log | head -1)
          echo "run1 ${d1}"
          echo "run2 ${d2}"
          test -n "${d1}"
          [ "${d1}" = "${d2}" ]
          cmp reports/evidence/ascent_k_results_run1.json reports/evidence/ascent_k_results.json
          cmp reports/evidence/ascent_k_ledger_run1.jsonl reports/evidence/ascent_k_ledger.jsonl

      - name: Run ascent phase L battery twice and assert digest equality
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode ascent-l-battery 2>&1 | tee reports/evidence/ascent_l_run1.log
          cp reports/evidence/ascent_l_results.json reports/evidence/ascent_l_results_run1.json
          cp reports/evidence/ascent_l_ledger.jsonl reports/evidence/ascent_l_ledger_run1.jsonl
          python -u "rsi_levels_metaforge_unified.py" --mode ascent-l-battery 2>&1 | tee reports/evidence/ascent_l_run2.log
          d1=$(grep -o '"al_digest": "[0-9a-f]*"' reports/evidence/ascent_l_run1.log | head -1)
          d2=$(grep -o '"al_digest": "[0-9a-f]*"' reports/evidence/ascent_l_run2.log | head -1)
          echo "run1 ${d1}"
          echo "run2 ${d2}"
          test -n "${d1}"
          [ "${d1}" = "${d2}" ]
          cmp reports/evidence/ascent_l_results_run1.json reports/evidence/ascent_l_results.json
          cmp reports/evidence/ascent_l_ledger_run1.jsonl reports/evidence/ascent_l_ledger.jsonl

      - name: Run ascent phase M battery twice and assert digest equality
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode ascent-m-battery 2>&1 | tee reports/evidence/ascent_m_run1.log
          cp reports/evidence/ascent_m_results.json reports/evidence/ascent_m_results_run1.json
          cp reports/evidence/ascent_m_ledger.jsonl reports/evidence/ascent_m_ledger_run1.jsonl
          python -u "rsi_levels_metaforge_unified.py" --mode ascent-m-battery 2>&1 | tee reports/evidence/ascent_m_run2.log
          d1=$(grep -o '"am_digest": "[0-9a-f]*"' reports/evidence/ascent_m_run1.log | head -1)
          d2=$(grep -o '"am_digest": "[0-9a-f]*"' reports/evidence/ascent_m_run2.log | head -1)
          echo "run1 ${d1}"
          echo "run2 ${d2}"
          test -n "${d1}"
          [ "${d1}" = "${d2}" ]
          cmp reports/evidence/ascent_m_results_run1.json reports/evidence/ascent_m_results.json
          cmp reports/evidence/ascent_m_ledger_run1.jsonl reports/evidence/ascent_m_ledger.jsonl

      - name: Run ascent phase N battery twice and assert digest equality
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode ascent-n-battery 2>&1 | tee reports/evidence/ascent_n_run1.log
          cp reports/evidence/ascent_n_results.json reports/evidence/ascent_n_results_run1.json
          cp reports/evidence/ascent_n_ledger.jsonl reports/evidence/ascent_n_ledger_run1.jsonl
          python -u "rsi_levels_metaforge_unified.py" --mode ascent-n-battery 2>&1 | tee reports/evidence/ascent_n_run2.log
          d1=$(grep -o '"an_digest": "[0-9a-f]*"' reports/evidence/ascent_n_run1.log | head -1)
          d2=$(grep -o '"an_digest": "[0-9a-f]*"' reports/evidence/ascent_n_run2.log | head -1)
          echo "run1 ${d1}"
          echo "run2 ${d2}"
          test -n "${d1}"
          [ "${d1}" = "${d2}" ]
          cmp reports/evidence/ascent_n_results_run1.json reports/evidence/ascent_n_results.json
          cmp reports/evidence/ascent_n_ledger_run1.jsonl reports/evidence/ascent_n_ledger.jsonl

      - name: Run ascent phase O battery twice and assert digest equality
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode ascent-o-battery 2>&1 | tee reports/evidence/ascent_o_run1.log
          cp reports/evidence/ascent_o_results.json reports/evidence/ascent_o_results_run1.json
          cp reports/evidence/ascent_o_ledger.jsonl reports/evidence/ascent_o_ledger_run1.jsonl
          python -u "rsi_levels_metaforge_unified.py" --mode ascent-o-battery 2>&1 | tee reports/evidence/ascent_o_run2.log
          d1=$(grep -o '"ao_digest": "[0-9a-f]*"' reports/evidence/ascent_o_run1.log | head -1)
          d2=$(grep -o '"ao_digest": "[0-9a-f]*"' reports/evidence/ascent_o_run2.log | head -1)
          echo "run1 ${d1}"
          echo "run2 ${d2}"
          test -n "${d1}"
          [ "${d1}" = "${d2}" ]
          cmp reports/evidence/ascent_o_results_run1.json reports/evidence/ascent_o_results.json
          cmp reports/evidence/ascent_o_ledger_run1.jsonl reports/evidence/ascent_o_ledger.jsonl

      - name: Run ascent phase P battery twice and assert digest equality
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode ascent-p-battery 2>&1 | tee reports/evidence/ascent_p_run1.log
          cp reports/evidence/ascent_p_results.json reports/evidence/ascent_p_results_run1.json
          cp reports/evidence/ascent_p_ledger.jsonl reports/evidence/ascent_p_ledger_run1.jsonl
          python -u "rsi_levels_metaforge_unified.py" --mode ascent-p-battery 2>&1 | tee reports/evidence/ascent_p_run2.log
          d1=$(grep -o '"ap_digest": "[0-9a-f]*"' reports/evidence/ascent_p_run1.log | head -1)
          d2=$(grep -o '"ap_digest": "[0-9a-f]*"' reports/evidence/ascent_p_run2.log | head -1)
          echo "run1 ${d1}"
          echo "run2 ${d2}"
          test -n "${d1}"
          [ "${d1}" = "${d2}" ]
          cmp reports/evidence/ascent_p_results_run1.json reports/evidence/ascent_p_results.json
          cmp reports/evidence/ascent_p_ledger_run1.jsonl reports/evidence/ascent_p_ledger.jsonl

      - name: Run full test suite after evidence artifacts
        shell: bash
        run: |
          set -o pipefail
          python -u "rsi_levels_metaforge_unified.py" --mode test 2>&1 | tee reports/evidence/full_test.log
          grep -E '^RESULT: 286 passed, 0 failed$' reports/evidence/full_test.log
          grep -E '^ALL TESTS PASSED$' reports/evidence/full_test.log

      - name: Collect generated evidence artifacts
        if: always()
        shell: bash
        run: |
          cp file_world_results.json reports/evidence/ 2>/dev/null || true
          cp forge_results.json reports/evidence/ 2>/dev/null || true
          cp closure_scan.json reports/evidence/ 2>/dev/null || true
          cp cfs_results.json reports/evidence/ 2>/dev/null || true
          cp expansion_results.json reports/evidence/ 2>/dev/null || true
          cp grammar_results.json reports/evidence/ 2>/dev/null || true
          cp grammar2_results.json reports/evidence/ 2>/dev/null || true
          cp -R fileworld reports/evidence/fileworld 2>/dev/null || true

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metaforge-evidence-${{ github.run_id }}
          path: reports/evidence
          if-no-files-found: warn
